<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architecture Showcase: 4-Wide OoO RISC-V</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0c10;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-glow: rgba(0, 255, 204, 0.5);
            --accent-primary: #00ffcc;
            --text-main: #ffffff;
            --text-muted: #8b92a5;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(0, 255, 204, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(138, 43, 226, 0.08), transparent 25%);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            font-weight: 800;
            font-size: 3rem;
            margin-bottom: 10px;
            text-align: center;
            background: linear-gradient(90deg, #fff, var(--accent-primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px var(--accent-glow);
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.2rem;
            margin-bottom: 50px;
            font-weight: 300;
            text-align: center;
            max-width: 800px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1200px;
        }

        .glass-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        }

        .glass-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4), 0 0 20px rgba(0, 255, 204, 0.1);
            border-color: rgba(0, 255, 204, 0.3);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 10px;
        }

        .test-name {
            font-size: 1.3rem;
            font-weight: 600;
            color: #fff;
        }

        .metric-pill {
            background: rgba(0, 255, 204, 0.1);
            color: var(--accent-primary);
            padding: 5px 12px;
            border-radius: 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            font-weight: 700;
            border: 1px solid rgba(0, 255, 204, 0.2);
            margin-right: 5px;
        }

        .veri-fail {
            background: rgba(255, 75, 75, 0.1);
            color: #ff4b4b;
            border-color: rgba(255, 75, 75, 0.3);
        }

        .chart-container {
            margin-top: 20px;
            margin-bottom: 20px;
        }

        .bar-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 5px;
            font-family: 'JetBrains Mono', monospace;
        }

        .bar-bg {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .bar-fill {
            height: 100%;
            border-radius: 4px;
            background: linear-gradient(90deg, #4facfe, var(--accent-primary));
            width: 0%; /* Dynamic */
            transition: width 1.5s cubic-bezier(0.22, 1, 0.36, 1);
        }
        
        .bar-fill.stalls {
            background: linear-gradient(90deg, #ff758c, #ff7eb3);
        }

        .notes {
            font-size: 0.9rem;
            line-height: 1.5;
            color: #aeb5c5;
        }

        .notes ul {
            padding-left: 20px;
            margin: 10px 0 0 0;
        }

        .notes li {
            margin-bottom: 6px;
        }
        
        .global-stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 50px;
        }
        
        .stat-block {
            text-align: center;
        }
        
        .stat-val {
            font-size: 2.5rem;
            font-weight: 800;
            font-family: 'JetBrains Mono', monospace;
            background: linear-gradient(90deg, #fff, #aeb5c5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .stat-label {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 5px;
        }

        /* Animation trigger class added by JS */
        .animate .bar-fill {
            width: var(--target-width);
        }
    </style>
</head>
<body>

    <h1>OoO 4-Wide RISC-V</h1>
    <div class="subtitle">Live Architecture Benchmarks & Performance Analysis</div>

    <div class="global-stats">
        <div class="stat-block">
            <div class="stat-val">{{TOTAL_TESTS}}</div>
            <div class="stat-label">Programs run</div>
        </div>
        <div class="stat-block">
            <div class="stat-val">{{AVG_IPC}}</div>
            <div class="stat-label">Average IPC</div>
        </div>
        <div class="stat-block">
            <div class="stat-val">{{TOTAL_CYCLES}}</div>
            <div class="stat-label">Sim cycles</div>
        </div>
    </div>

    <div class="dashboard-grid">
        <!-- INJECT_CARDS_HERE -->
    </div>

    <script>
        // Trigger animations immediately upon load
        window.onload = () => {
            setTimeout(() => {
                document.querySelectorAll('.glass-card').forEach(card => card.classList.add('animate'));
            }, 100);
        }
    </script>
</body>
</html>
